{% extends "base.html" %}
{% block title %}Chỉnh sửa tài khoản - Smart Bookstore{% endblock %}
{% block content %}
<h1 class="mb-4">Chỉnh sửa thông tin</h1>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Lưu</button>
    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Hủy</a>
</form>
{% endblock %}
